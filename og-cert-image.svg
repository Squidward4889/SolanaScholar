<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#071226"/>
      <stop offset="100%" style="stop-color:#1b1142"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#79bcff"/>
      <stop offset="50%" style="stop-color:#ff5ea8"/>
      <stop offset="100%" style="stop-color:#7b43ff"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bg)" rx="32"/>

  <!-- Glow orbs -->
  <circle cx="80" cy="80" r="80" fill="#2960ff" opacity="0.25" filter="url(#blur)"/>
  <circle cx="320" cy="300" r="90" fill="#ff5ea8" opacity="0.2" filter="url(#blur)"/>
  <circle cx="200" cy="200" r="60" fill="#7b43ff" opacity="0.15" filter="url(#blur)"/>

  <!-- Outer ring -->
  <circle cx="200" cy="185" r="90" fill="none" stroke="url(#glow)" stroke-width="1.5" opacity="0.4"/>
  <circle cx="200" cy="185" r="72" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Core circle -->
  <circle cx="200" cy="185" r="58" fill="rgba(14,18,40,0.9)" stroke="url(#glow)" stroke-width="2"/>

  <!-- Star / medal icon -->
  <text x="200" y="200" text-anchor="middle" font-size="42" fill="url(#glow)">✦</text>

  <!-- OG Badge -->
  <rect x="160" y="218" width="80" height="24" rx="12" fill="url(#glow)" opacity="0.9"/>
  <text x="200" y="235" text-anchor="middle" font-size="11" font-family="sans-serif" font-weight="700" fill="#040611" letter-spacing="2">OG USER</text>

  <!-- Title -->
  <text x="200" y="298" text-anchor="middle" font-size="17" font-family="sans-serif" font-weight="700" fill="#f8f8fd" letter-spacing="-0.5">OG User Certificate</text>
  <text x="200" y="320" text-anchor="middle" font-size="11" font-family="sans-serif" fill="#79bcff" letter-spacing="1.5">SOLANA SCHOLAR</text>

  <!-- Bottom pills -->
  <rect x="100" y="342" width="90" height="20" rx="10" fill="rgba(121,188,255,0.12)" stroke="rgba(121,188,255,0.3)" stroke-width="1"/>
  <text x="145" y="356" text-anchor="middle" font-size="9" font-family="sans-serif" fill="#79bcff">Token-2022</text>

  <rect x="206" y="342" width="96" height="20" rx="10" fill="rgba(255,94,168,0.12)" stroke="rgba(255,94,168,0.3)" stroke-width="1"/>
  <text x="254" y="356" text-anchor="middle" font-size="9" font-family="sans-serif" fill="#ff5ea8">Non-Transferable</text>
</svg>
